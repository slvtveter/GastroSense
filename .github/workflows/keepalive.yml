# Keeps the Render free-tier services from spinning down.
#
# Render's free web services sleep after ~15 minutes with no traffic, and
# waking the backend from sleep is slow and unreliable (observed up to ~5
# minutes), during which every API call returns a 502 and the dashboard never
# loads. A visitor opening the site after an idle period would hit exactly
# that broken state.
#
# This scheduled job pings both services every 10 minutes so the 15-minute
# idle timer never elapses and the containers stay warm 24/7. GitHub Actions
# on a public repo is free, so this costs nothing.
#
# Note: GitHub may disable scheduled workflows after 60 days of no repo
# activity, and schedule times can drift a few minutes under load - both are
# fine for a 10-minute keep-warm against a 15-minute timeout.
name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend and frontend
        run: |
          for url in \
            "https://gastrosense-backend.onrender.com/" \
            "https://gastrosense-frontend.onrender.com/"; do
            echo "Pinging $url"
            # --max-time 180 so the ping itself rides out a cold start and
            # wakes the service instead of giving up; --retry covers transient
            # 5xx while the container is still booting.
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 180 --retry 3 --retry-delay 10 --retry-all-errors \
              "$url" || echo "000")
            echo "  -> HTTP $code"
          done
